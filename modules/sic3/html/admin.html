<!-- modules/sic3/html/admin.html -->

<!-- Mantido de forma oculta para compatibilidade com o trigger de inicialização da view no JS legado -->
<span id="mainTitle" style="display: none !important;">PAINEL ADMINISTRATIVO</span>



<div class="info-convenio">
  <div class="linha-1">
    <div class="coluna ano">
      <label for="ano">Ano:</label>
      <select id="ano" required> </select>
    </div>

    <div class="coluna mes">
      <label for="mes">Mês:</label>
      <select id="mes">
        <option value="TODOS" selected>TODOS</option>
        <option value="JANEIRO">JANEIRO</option>
        <option value="FEVEREIRO">FEVEREIRO</option>
        <option value="MARÇO">MARÇO</option>
        <option value="ABRIL">ABRIL</option>
        <option value="MAIO">MAIO</option>
        <option value="JUNHO">JUNHO</option>
        <option value="JULHO">JULHO</option>
        <option value="AGOSTO">AGOSTO</option>
        <option value="SETEMBRO">SETEMBRO</option>
        <option value="OUTUBRO">OUTUBRO</option>
        <option value="NOVEMBRO">NOVEMBRO</option>
        <option value="DEZEMBRO">DEZEMBRO</option>
      </select>
    </div>

    <div class="coluna municipio">
      <label for="municipio">Município:</label>
      <select id="municipio" required></select>
    </div>

    <div class="coluna convenio">
      <label for="convenio">Convênio:</label>
      <select id="convenio" required></select>
    </div>
  </div>

  <div class="linha-2">
    <div class="coluna preposto">
      <label for="preposto">Preposto:</label>
      <input type="text" id="preposto" disabled />
    </div>

    <div class="coluna unidade">
      <label for="unidade">Unidade:</label>
      <input type="text" id="unidade" disabled />
    </div>

    <button class="btn-alterar dropdown-item btn-warning">ALTERAR</button>

    <div class="dropdown" style="display: none;">
      <button class="btn-acoes dropdown-toggle btn-secondary">AÇÕES</button>
      <div class="dropdown-menu">
        <button class="btn-alterar dropdown-item btn-warning">ALTERAR</button>
        <button class="btn-incluir dropdown-item btn-success">INCLUIR</button>
        <button class="btn-excluir dropdown-item btn-danger">EXCLUIR</button>
        <button id="btnPrestacaoContasAnual" class="dropdown-item btn-info"><i class="fas fa-file-pdf"></i> REL. ANUAL</button>
        <button id="btnRecarregarDados" class="dropdown-item btn-secondary"><i class="fas fa-sync-alt"></i> RECARREGAR</button>
      </div>
    </div>
  </div>
</div>

<div class="principal-container"> 
  <table id="tabela-lancamentos" class="tabela-lancamentos">
    <thead>
      <tr>
        <th>MUNICÍPIO</th>
        <th>CONVÊNIO</th>
        <th>ANO</th>
        <th>MÊS</th>
        <th>TOTAL</th>
        <th class="th-ultima-atualizacao">ÚLTIMA ATUALIZAÇÃO</th>
        <th class="cell-actions-header">LANÇAMENTOS</th>
        <th>EDIÇÃO</th>
        <th class="sirconv-col" style="display: none;">SIRCONV</th>
        <th class="admin-only" style="display: none;">SIAD</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div class="datatable-container" style="display: none;">
  <table id="dataTable"></table>
</div>

<div id="modal-base" class="modal" style="display: none;">
  <div class="modal-content">
    <div class="modal-header">
      <h2></h2>
    </div>
    <div class="modal-body">
    </div>
    <div class="modal-footer">
      <span class="info">* Campos obrigatórios</span>
      <div class="buttons-container">
        <button type="button" class="btn-secondary">Cancelar</button>
        <button type="submit" class="btn-primary">Alterar</button>
      </div>
    </div>
  </div>
</div>
